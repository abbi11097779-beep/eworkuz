<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2>Admin Panel</h2>

    {% for user in users %}
        <div class="card mb-3 p-3">
            <h5>{{ user.email }}</h5>
            <ul>
                {% for p in user.projects %}
                    <li>{{ p.title }}</li>
                {% endfor %}
            </ul>
        </div>
    {% endfor %}

</div>

</body>
</html>
