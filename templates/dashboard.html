<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4">Xush kelibsiz, {{ name }} 🚀</h2>

    <div class="card p-4 mb-4">
        <h4>Portfolio qo'shish</h4>
        <form action="/add_project" method="POST">
            <input type="text" name="project" class="form-control mb-3" placeholder="Loyiha nomi" required>
            <button type="submit" class="btn btn-primary">Qo'shish</button>
        </form>
    </div>

    <div class="card p-4">
        <h4>Mening loyihalarim</h4>
        <ul class="list-group">
            {% for p in projects %}
                <li class="list-group-item">{{ p }}</li>
            {% endfor %}
        </ul>
    </div>

    <br>
    <a href="/logout" class="btn btn-danger mt-3">Chiqish</a>
</div>

</body>
</html>
